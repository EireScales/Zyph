<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zyph — Sign in</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0a0a0a;
        color: #f0f0f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 320px;
        background: #111111;
        border: 1px solid #27272a;
        border-radius: 12px;
        padding: 28px;
      }
      h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 8px 0; }
      .sub { font-size: 0.875rem; color: #71717a; margin-bottom: 24px; }
      label { display: block; font-size: 0.8125rem; font-weight: 500; color: #a1a1aa; margin-bottom: 6px; }
      input {
        width: 100%;
        padding: 10px 12px;
        margin-bottom: 16px;
        background: #18181b;
        border: 1px solid #3f3f46;
        border-radius: 8px;
        color: #f0f0f0;
        font-size: 0.9375rem;
      }
      input:focus { outline: none; border-color: #7c3aed; }
      button[type="submit"] {
        width: 100%;
        padding: 10px 16px;
        background: #7c3aed;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 500;
        font-size: 0.9375rem;
        cursor: pointer;
        margin-top: 8px;
      }
      button[type="submit"]:hover { background: #6d28d9; }
      button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
      .error { font-size: 0.8125rem; color: #f87171; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Zyph</h1>
      <p class="sub">Sign in to start capturing</p>
      <form id="form">
        <label for="apiUrl">Dashboard URL</label>
        <input type="url" id="apiUrl" placeholder="https://your-app.vercel.app" value="http://localhost:3000" required />
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        <div id="error" class="error" style="display: none;"></div>
        <button type="submit" id="submit">Sign in</button>
      </form>
    </div>
    <script type="module" src="/src/login.ts"></script>
  </body>
</html>
